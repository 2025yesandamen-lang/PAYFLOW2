<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PayFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-xl">PF</span>
                    </div>
                </div>
                <h1 class="text-3xl font-bold text-indigo-600">PayFlow</h1>
                <p class="text-gray-600 mt-2">Welcome back, sign in to your account</p>
            </div>

            <!-- Error Alert -->
            <div id="errorAlert" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-start space-x-2">
                <span class="text-lg leading-none">⚠️</span>
                <div>
                    <p id="errorMessage" class="font-medium"></p>
                    <p id="errorDetails" class="text-sm mt-1"></p>
                </div>
            </div>

            <!-- Success Alert -->
            <div id="successAlert" class="hidden mb-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm flex items-start space-x-2">
                <span class="text-lg leading-none">✅</span>
                <p id="successMessage" class="font-medium"></p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-4" novalidate>
                <!-- Email Input -->
                <div>
                    <label for="loginEmail" class="block text-gray-700 font-medium mb-2">Email Address</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        name="email"
                        placeholder="you@example.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        required
                        autocomplete="email"
                    >
                    <span class="error-text text-red-500 text-sm hidden">Valid email is required</span>
                </div>

                <!-- Password Input -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="loginPassword" class="block text-gray-700 font-medium">Password</label>
                        <a href="forgot-password.html" class="text-indigo-600 text-sm hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                            required
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            class="togglePassword absolute right-3 top-2.5 text-gray-600 hover:text-gray-800"
                            data-target="#loginPassword"
                        >
                            👁️
                        </button>
                    </div>
                    <span class="error-text text-red-500 text-sm hidden">Password is required</span>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center space-x-2">
                    <input 
                        type="checkbox" 
                        id="rememberMe"
                        name="rememberMe"
                        class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-2 focus:ring-indigo-500"
                    >
                    <label for="rememberMe" class="text-gray-600 text-sm">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    id="loginButton"
                    class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2"
                >
                    <span id="loginButtonText">Sign In</span>
                    <span id="loginSpinner" class="hidden">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Or</span>
                </div>
            </div>

            <!-- Signup Link -->
            <div class="text-center">
                <p class="text-gray-600 text-sm">
                    Don't have an account?
                    <a href="signup.html" class="text-indigo-600 font-semibold hover:underline">Sign up here</a>
                </p>
            </div>

            <!-- Back to Home -->
            <div class="text-center mt-4">
                <a href="index.html" class="text-gray-500 text-sm hover:text-gray-700 transition">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js" type="module"></script>
    <script src="js/auth-service.js" type="module"></script>
    <script src="js/auth-ui.js" type="module"></script>
</body>
</html>
