<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PayFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-xl">PF</span>
                    </div>
                </div>
                <h1 class="text-3xl font-bold text-indigo-600">PayFlow</h1>
                <p class="text-gray-600 mt-2">Create your account to get started</p>
            </div>

            <!-- Error Alert -->
            <div id="errorAlert" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-start space-x-2">
                <span class="text-lg leading-none">⚠️</span>
                <div>
                    <p id="errorMessage" class="font-medium"></p>
                    <p id="errorDetails" class="text-sm mt-1"></p>
                </div>
            </div>

            <!-- Success Alert -->
            <div id="successAlert" class="hidden mb-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm flex items-start space-x-2">
                <span class="text-lg leading-none">✅</span>
                <p id="successMessage" class="font-medium"></p>
            </div>

            <!-- Signup Form -->
            <form id="signupForm" class="space-y-4" novalidate>
                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-gray-700 font-medium mb-2">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName"
                        placeholder="John Doe"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        required
                    >
                    <span class="error-text text-red-500 text-sm hidden">Full name is required</span>
                </div>

                <!-- Email Input -->
                <div>
                    <label for="signupEmail" class="block text-gray-700 font-medium mb-2">Email Address</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        name="email"
                        placeholder="you@example.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        required
                    >
                    <span class="error-text text-red-500 text-sm hidden">Valid email is required</span>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="signupPassword" class="block text-gray-700 font-medium mb-2">Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="signupPassword" 
                            name="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                            required
                        >
                        <button 
                            type="button" 
                            class="togglePassword absolute right-3 top-2.5 text-gray-600 hover:text-gray-800"
                            data-target="#signupPassword"
                        >
                            👁️
                        </button>
                    </div>
                    <span class="error-text text-red-500 text-sm hidden">Password must be at least 6 characters</span>
                    <p class="text-gray-500 text-xs mt-2">
                        <span id="passwordStrength">Password strength: </span>
                        <span id="strengthBar" class="inline-block h-1 w-16 bg-gray-300 rounded mt-1"></span>
                    </p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-gray-700 font-medium mb-2">Confirm Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword"
                            placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                            required
                        >
                        <button 
                            type="button" 
                            class="togglePassword absolute right-3 top-2.5 text-gray-600 hover:text-gray-800"
                            data-target="#confirmPassword"
                        >
                            👁️
                        </button>
                    </div>
                    <span class="error-text text-red-500 text-sm hidden">Passwords must match</span>
                </div>

                <!-- Terms Checkbox -->
                <div class="flex items-center space-x-2">
                    <input 
                        type="checkbox" 
                        id="termsCheckbox"
                        name="terms"
                        class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-2 focus:ring-indigo-500"
                        required
                    >
                    <label for="termsCheckbox" class="text-gray-600 text-sm">
                        I agree to the <a href="#" class="text-indigo-600 hover:underline">Terms of Service</a> and <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    id="signupButton"
                    class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2"
                >
                    <span id="signupButtonText">Create Account</span>
                    <span id="signupSpinner" class="hidden">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Or</span>
                </div>
            </div>

            <!-- Login Link -->
            <div class="text-center">
                <p class="text-gray-600 text-sm">
                    Already have an account?
                    <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Login here</a>
                </p>
            </div>

            <!-- Back to Home -->
            <div class="text-center mt-4">
                <a href="index.html" class="text-gray-500 text-sm hover:text-gray-700 transition">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js" type="module"></script>
    <script src="js/auth-service.js" type="module"></script>
    <script src="js/auth-ui.js" type="module"></script>
</body>
</html>
