<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow - Invoice & Payment Reminder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 max-w-md">
        <!-- Landing Page Content -->
        <div class="bg-white rounded-lg shadow-xl p-8 text-center">
            <!-- Logo -->
            <div class="mb-6">
                <h1 class="text-4xl font-bold text-indigo-600">PayFlow</h1>
                <p class="text-gray-500 text-sm mt-2">Invoice & Payment Reminder System</p>
            </div>

            <!-- Description -->
            <p class="text-gray-600 mb-8 leading-relaxed">
                Create invoices and send WhatsApp reminders to your customers in seconds. 
                Simple, fast, and secure.
            </p>

            <!-- Features List -->
            <div class="mb-8 text-left">
                <h3 class="font-semibold text-gray-800 mb-4">Features:</h3>
                <ul class="space-y-2 text-gray-600 text-sm">
                    <li class="flex items-center">
                        <span class="text-indigo-600 mr-2">✓</span> Create & manage invoices
                    </li>
                    <li class="flex items-center">
                        <span class="text-indigo-600 mr-2">✓</span> Send WhatsApp reminders
                    </li>
                    <li class="flex items-center">
                        <span class="text-indigo-600 mr-2">✓</span> Track payment status
                    </li>
                    <li class="flex items-center">
                        <span class="text-indigo-600 mr-2">✓</span> Secure cloud storage
                    </li>
                </ul>
            </div>

            <!-- CTA Buttons -->
            <div class="space-y-3">
                <a href="auth/login.html?mode=login" class="block w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-indigo-700 transition">
                    Login
                </a>
                <a href="auth/login.html?mode=signup" class="block w-full bg-white text-indigo-600 font-semibold py-3 px-4 rounded-lg border-2 border-indigo-600 hover:bg-indigo-50 transition">
                    Sign Up
                </a>
            </div>
        </div>
    </div>
</body>
</html>
