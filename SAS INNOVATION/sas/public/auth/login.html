<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow - Login</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-600">PayFlow</h1>
                <p id="authTitle" class="text-gray-600 mt-2">Create Account</p>
            </div>

            <!-- Alert Messages -->
            <div id="alertBox" class="hidden mb-4 p-4 rounded-lg text-sm"></div>

            <!-- Auth Form -->
            <form id="authForm" class="space-y-4">
                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        required
                    >
                </div>

                <!-- Password Input -->
                <div>
                    <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        required
                    >
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    id="authButton"
                    class="w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50"
                >
                    Sign Up
                </button>
            </form>

            <!-- Toggle Link -->
            <div class="text-center mt-6">
                <p class="text-gray-600 text-sm">
                    <span id="toggleText">Already have an account?</span>
                    <button 
                        type="button"
                        id="toggleButton"
                        class="text-indigo-600 font-semibold hover:underline"
                    >
                        Login
                    </button>
                </p>
            </div>

            <!-- Back to Home -->
            <div class="text-center mt-4">
                <a href="../index.html" class="text-gray-500 text-sm hover:text-gray-700">Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
