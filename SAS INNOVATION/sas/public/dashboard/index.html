<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow - Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">PayFlow</h1>
            <div class="flex items-center space-x-4">
                <span id="userEmail" class="text-gray-600 text-sm"></span>
                <button 
                    id="logoutBtn"
                    class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition"
                >
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mx-auto px-4 py-8">
        <!-- Header Section -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Dashboard</h2>
            <p class="text-gray-600">Manage your invoices and send payment reminders</p>
        </div>

        <!-- Create Invoice Button -->
        <div class="mb-8">
            <button 
                id="createInvoiceBtn"
                class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition font-semibold"
            >
                + Create Invoice
            </button>
        </div>

        <!-- Invoice Creation Modal -->
        <div id="invoiceModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-8">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Create New Invoice</h3>
                
                <form id="invoiceForm" class="space-y-4">
                    <!-- Customer Name -->
                    <div>
                        <label for="customerName" class="block text-gray-700 font-medium mb-2">Customer Name</label>
                        <input 
                            type="text" 
                            id="customerName" 
                            placeholder="John Doe"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            required
                        >
                    </div>

                    <!-- Phone Number -->
                    <div>
                        <label for="customerPhone" class="block text-gray-700 font-medium mb-2">Phone Number</label>
                        <input 
                            type="tel" 
                            id="customerPhone" 
                            placeholder="+1 (555) 123-4567"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            required
                        >
                    </div>

                    <!-- Amount -->
                    <div>
                        <label for="amount" class="block text-gray-700 font-medium mb-2">Amount ($)</label>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="0.00"
                            step="0.01"
                            min="0"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            required
                        >
                    </div>

                    <!-- Due Date -->
                    <div>
                        <label for="dueDate" class="block text-gray-700 font-medium mb-2">Due Date</label>
                        <input 
                            type="date" 
                            id="dueDate"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            required
                        >
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="description" class="block text-gray-700 font-medium mb-2">Description</label>
                        <textarea 
                            id="description" 
                            placeholder="Invoice description (optional)"
                            rows="3"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none"
                        ></textarea>
                    </div>

                    <!-- Form Buttons -->
                    <div class="flex gap-3 pt-4">
                        <button 
                            type="submit"
                            class="flex-1 bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700 transition"
                        >
                            Create Invoice
                        </button>
                        <button 
                            type="button"
                            id="closeModalBtn"
                            class="flex-1 bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg hover:bg-gray-400 transition"
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Invoices List -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">Your Invoices</h3>
            </div>

            <!-- Invoice Items Container -->
            <div id="invoicesList" class="divide-y divide-gray-200">
                <!-- Invoices will be loaded here -->
                <div class="px-6 py-8 text-center text-gray-500">
                    <p>No invoices yet. Create your first invoice to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/invoice.js"></script>
    <script src="../js/whatsapp.js"></script>
</body>
</html>
